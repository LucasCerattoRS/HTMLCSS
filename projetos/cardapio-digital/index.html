<!doctype html>
<html lang="pt-BR">
  <!-- ============================================================
       PROJETO DE ESTUDO: CARDÁPIO DIGITAL MOBILE-FIRST
       ============================================================
       Versão didática e anonimizada de um cardápio real vendido a
       um restaurante (acessado por QR code nas mesas).

       O que este projeto ensina:
       1. CSS Custom Properties (variáveis) para tema consistente
       2. clamp() para tipografia fluida sem media queries
       3. Carrossel "stories" só com CSS (scroll-snap)
       4. Navegação sticky com backdrop-filter
       5. Filtro de categorias com JS mínimo (data-attributes)
       6. Acessibilidade: focus-visible, prefers-reduced-motion
       7. Zero build: 1 arquivo, 1 request — abra e funciona

       Dados reais (nome, telefone, fotos, preços) foram trocados
       por placeholders: o cliente pagou pelo produto, o estudo
       fica com a TÉCNICA.
       ============================================================ -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio Digital — Projeto de Estudo</title>
    <style>
      /* ── 1. RESET + VARIÁVEIS ─────────────────────────────────
         Custom properties no :root ficam disponíveis em toda a
         árvore. Trocar o tema inteiro = trocar 8 linhas.        */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /* remove o "flash" azul de toque no Android */
        -webkit-tap-highlight-color: transparent;
      }

      html {
        scroll-behavior: smooth; /* âncoras rolam suave, sem JS */
      }

      :root {
        --acento: #ff7043;        /* cor de marca (CTA, preços) */
        --apoio: #66bb6a;         /* cor secundária (detalhes)  */
        --fundo: #121212;         /* dark theme: fundo base     */
        --fundo-2: #1e1e1e;       /* superfícies elevadas       */
        --texto: #ffffff;
        --texto-suave: #b0b0b0;
        --borda: rgba(255, 112, 67, 0.2); /* acento a 20% */
      }

      body {
        /* Font stack de sistema: zero download de fonte,
           aparência nativa em cada plataforma */
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--fundo);
        color: var(--texto);
        min-height: 100vh;
        overflow-x: hidden;
        line-height: 1.5;
      }

      /* ── 2. CABEÇALHO ────────────────────────────────────────── */
      .header {
        text-align: center;
        padding: 30px 15px 20px;
        border-bottom: 2px solid var(--acento);
      }

      h1 {
        /* clamp(min, ideal, max): a fonte escala com a viewport
           (8vw) mas nunca sai da faixa 2rem–3rem. Tipografia
           fluida SEM media query.                              */
        font-size: clamp(2rem, 8vw, 3rem);
        color: var(--acento);
        font-weight: 800;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 0.85rem;
        color: var(--apoio);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
      }

      /* ── 3. CARROSSEL "STORIES" (100% CSS) ───────────────────
         Um flex container com overflow-x + scroll-snap imita o
         carrossel do Instagram sem uma linha de JavaScript:
         - scroll-snap-type no PAI define o eixo e a obrigação
         - scroll-snap-align no FILHO define onde ele "gruda"   */
      .hero-images {
        display: flex;
        gap: 12px;
        padding: 20px 15px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;            /* esconde barra (Firefox) */
      }
      .hero-images::-webkit-scrollbar {
        display: none;                    /* esconde barra (Chrome)  */
      }

      .hero-img {
        /* flex: 0 0 85vw → não cresce, não encolhe, ocupa 85% da
           viewport: o próximo card "espia" na borda, convidando
           ao scroll (affordance).                               */
        flex: 0 0 85vw;
        max-width: 350px;
        height: 200px;
        border-radius: 12px;
        overflow: hidden;
        scroll-snap-align: center;
        border: 2px solid var(--apoio);
        position: relative;

        /* PLACEHOLDER didático: no projeto real aqui entra
           <picture> com webp + fallback jpg. Gradiente simula a
           foto do prato sem depender de assets.                 */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        background: linear-gradient(135deg, #2a1a12, #3d2317);
      }

      .hero-caption {
        /* Legenda sobreposta: gradiente transparente→escuro
           garante contraste do texto sobre qualquer imagem     */
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 18px 12px 10px;
        font-size: 0.95rem;
        font-weight: 800;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.75) 100%
        );
      }

      /* ── 4. NAVEGAÇÃO STICKY ─────────────────────────────────
         position: sticky mantém as abas visíveis ao rolar.
         backdrop-filter desfoca o conteúdo que passa por trás
         (efeito "vidro fosco" — precisa de fundo translúcido). */
      .nav-container {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(18, 18, 18, 0.9);
        backdrop-filter: blur(10px);
        padding: 12px 0;
        border-bottom: 1px solid var(--borda);
      }

      .tab-nav {
        display: flex;
        gap: 10px;
        overflow-x: auto;   /* abas roláveis se não couberem */
        padding: 0 15px;
        scrollbar-width: none;
      }
      .tab-nav::-webkit-scrollbar {
        display: none;
      }

      .tab-btn {
        background: rgba(255, 112, 67, 0.05);
        color: var(--texto-suave);
        border: 1px solid var(--borda);
        /* 10px 20px ≈ 44px de altura total: área mínima de toque
           recomendada (Apple HIG / Material Design)            */
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 0.9rem;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: 600;
        text-transform: uppercase;
      }

      .tab-btn.active {
        background: var(--acento);
        color: var(--fundo);
      }

      /* Feedback tátil: encolhe levemente ao pressionar */
      .tab-btn:active {
        transform: scale(0.96);
      }

      /* Acessibilidade: anel de foco APENAS para teclado
         (:focus-visible não dispara em clique/toque)           */
      .tab-btn:focus-visible {
        outline: 2px solid var(--apoio);
        outline-offset: 2px;
      }

      /* ── 5. CARDS DO CARDÁPIO ────────────────────────────────── */
      .menu-container {
        padding: 15px;
      }

      .menu-section {
        margin-bottom: 30px;
        animation: fadeIn 0.4s ease-out;
      }

      h2 {
        color: var(--acento);
        font-size: 1.4rem;
        margin-bottom: 15px;
        padding-left: 10px;
        border-left: 4px solid var(--apoio);
        text-transform: uppercase;
      }

      .menu-item {
        background: var(--fundo-2);
        border: 1px solid var(--borda);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        position: relative;
      }

      /* Detalhe lateral com pseudo-elemento: decoração sem
         elemento extra no HTML                                  */
      .menu-item::before {
        content: "";
        position: absolute;
        top: 10%;
        bottom: 10%;
        left: 0;
        width: 4px;
        background: var(--acento);
        border-radius: 0 4px 4px 0;
      }

      .item-header {
        display: flex;
        justify-content: space-between; /* nome ← → preço */
        align-items: flex-start;
        gap: 15px;
      }

      .item-name {
        font-size: 1.15rem;
        font-weight: 700;
      }

      .item-details {
        font-size: 0.9rem;
        color: var(--texto-suave);
        margin-top: 5px;
      }

      .price {
        color: var(--acento);
        font-size: 1.25rem;
        font-weight: 800;
        white-space: nowrap; /* preço nunca quebra em 2 linhas */
      }

      .badge {
        display: inline-block;
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 800;
        text-transform: uppercase;
        background: var(--apoio);
        color: var(--fundo);
        margin-top: 8px;
      }

      /* ── 6. ANIMAÇÃO + RESPEITO AO USUÁRIO ───────────────────── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Usuários com sensibilidade a movimento (configuração do
         SO) recebem a página sem animações. Uma media query =
         requisito WCAG atendido.                                */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }

      /* ── 7. PROGRESSIVE ENHANCEMENT: DESKTOP ─────────────────
         Mobile-first: o CSS base É o layout de celular. O grid
         só entra em telas maiores.                              */
      @media (min-width: 768px) {
        .menu-section > .cards {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
          gap: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>RESTAURANTE MODELO</h1>
      <div class="subtitle">Projeto de estudo — cardápio digital</div>
    </div>

    <!-- Carrossel: cada .hero-img é um "slide". No projeto real,
         emoji vira <picture><source webp><img jpg></picture>    -->
    <div class="hero-images">
      <div class="hero-img">🍔<div class="hero-caption">Prato destaque 1</div></div>
      <div class="hero-img">🍟<div class="hero-caption">Prato destaque 2</div></div>
      <div class="hero-img">🥤<div class="hero-caption">Prato destaque 3</div></div>
    </div>

    <!-- Abas: onclick passa a categoria; o JS cruza com o
         data-category das seções. Adicionar categoria nova =
         1 botão + 1 seção, sem tocar no script.                 -->
    <div class="nav-container">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="filterMenu('all')">Todos</button>
        <button class="tab-btn" onclick="filterMenu('lanches')">Lanches</button>
        <button class="tab-btn" onclick="filterMenu('bebidas')">Bebidas</button>
      </div>
    </div>

    <div class="menu-container">
      <!-- data-category conecta a seção à aba correspondente -->
      <div class="menu-section" data-category="lanches">
        <h2>Lanches</h2>
        <div class="cards">
          <div class="menu-item">
            <div class="item-header">
              <span class="item-name">Lanche Clássico</span>
              <span class="price">R$ 25</span>
            </div>
            <div class="item-details">
              Descrição dos ingredientes do lanche.
              <div><span class="badge">Novidade</span></div>
            </div>
          </div>
          <div class="menu-item">
            <div class="item-header">
              <span class="item-name">Lanche Completo</span>
              <span class="price">R$ 33</span>
            </div>
            <div class="item-details">Descrição dos ingredientes.</div>
          </div>
        </div>
      </div>

      <div class="menu-section" data-category="bebidas">
        <h2>Bebidas</h2>
        <div class="cards">
          <div class="menu-item">
            <div class="item-header">
              <span class="item-name">Suco Natural</span>
              <span class="price">R$ 10</span>
            </div>
          </div>
          <div class="menu-item">
            <div class="item-header">
              <span class="item-name">Refrigerante Lata</span>
              <span class="price">R$ 6</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* FILTRO POR CATEGORIA — o único JS da página.
         Estratégia: HTML carrega TUDO; o JS apenas esconde o que
         não pertence à categoria ativa. Vantagens:
         - sem fetch/estado: dados vivem no próprio HTML
         - SEO e leitor de tela veem o cardápio completo
         - funciona offline depois do primeiro load             */
      function filterMenu(category) {
        const sections = document.querySelectorAll(".menu-section");
        const buttons = document.querySelectorAll(".tab-btn");

        sections.forEach((section) => {
          if (
            category === "all" ||
            section.getAttribute("data-category") === category
          ) {
            section.style.display = "block";
            /* Truque do reflow: zerar a animação, forçar o
               navegador a recalcular (ler offsetHeight) e
               reaplicar — assim o fadeIn roda de novo a cada
               troca de aba.                                     */
            section.style.animation = "none";
            section.offsetHeight;
            section.style.animation = "fadeIn 0.3s ease-out";
          } else {
            section.style.display = "none";
          }
        });

        /* Estado visual das abas: remove .active de todas e
           devolve só à clicada                                  */
        buttons.forEach((btn) => {
          btn.classList.remove("active");
          if (btn.getAttribute("onclick").includes(`'${category}'`)) {
            btn.classList.add("active");
          }
        });
      }
    </script>
  </body>
</html>
