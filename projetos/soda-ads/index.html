<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soda</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <div class="item active" style="--background: #EA3D41">
            <div class="tittle"> Strawberry </div>
            <img src="./img/Morango-refrigerante.png" class="soda">
            <img src="./img/Morango-foregroundBlur.png" class="foreground">
        </div>

        <div class="item" style="--background: #E7A043">
            <div class="tittle"> Orange </div>
            <img src="./img/Laranja-refrigerante.png" class="soda">
            <img src="./img/Laranja-foregroundBlur.png" class="foreground">
        </div>

        <div class="item" style="--background: #2D5643">
            <div class="tittle"> Avocado </div>
            <img src="./img/Abacate-refrigerante.png" class="soda">
            <img src="./img/Abacate-foregroundBlur.png" class="foreground">
        </div>

        <div class="arrow">
            <button id="prev"> < </button>
            <button id="next"> > </button>
        </div>
    </main>

</body>
<script src="./scripts.js"></script>
</html>
